<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milf In The Basement</title>

    <style>
        /* Persona 3 Reload inspired colors */
        :root {
            --main-blue: #6d9ac7;
            --accent-cyan: #51eefc;
            --deep-blue: #1269cc;
            --text-dark: #303030;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--main-blue);
            color: var(--text-dark);
            text-align: center;
        }

        header {
            background-color: var(--deep-blue);
            padding: 20px;
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
            color: var(--white);
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: var(--accent-cyan);
            font-weight: bold;
        }

        .merch-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .merch-item {
            background-color: var(--white);
            padding: 15px;
            border-radius: 12px;
            width: 220px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .merch-item:hover {
            transform: scale(1.07);
        }

        .merch-item img {
            width: 100%;
            border-radius: 8px;
        }

        .merch-item h3 {
            color: var(--deep-blue);
        }

        .buy-button {
            display: inline-block;
            margin-top: 8px;
            padding: 8px 14px;
            background-color: var(--accent-cyan);
            color: var(--text-dark);
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
        }

        footer {
            margin-top: 30px;
            padding: 15px;
            background-color: var(--deep-blue);
            color: var(--white);
        }

        audio {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Milf In The Basement </h1>
        <nav>
            <a href="#merch">Merch</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

</section>
